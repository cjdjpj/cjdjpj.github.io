---
layout: default
---

{% assign cdn = "https://res.cloudinary.com/dbfwxtk7g/image/upload" %}

<div class="photo-grid">
    {% for photo in page.photos %}
    <div class="photo-item">
        <img
            src="{{ cdn }}/f_auto,q_auto,w_800,dpr_auto/{{ photo.id }}"
            srcset="
                {{ cdn }}/f_auto,q_auto,w_400/{{ photo.id }} 400w,
                {{ cdn }}/f_auto,q_auto,w_800/{{ photo.id }} 800w,
                {{ cdn }}/f_auto,q_auto,w_1600/{{ photo.id }} 1600w
            "
            sizes="(max-width: 600px) 50vw, 33vw"
            alt="{{ photo.alt }}"
            loading="lazy"
            class="expandable"
            data-full="{{ cdn }}/f_auto,q_auto,w_2400/{{ photo.id }}"
            data-alt="{{ photo.alt }}"
        >
        {% if photo.caption %}
        <p class="caption">{{ photo.caption }}</p>
        {% endif %}
    </div>
    {% endfor %}
</div>

<div class="refresh-wrap">
    <button id="refresh-btn">refresh</button>
</div>

<div id="lightbox" aria-modal="true" role="dialog" aria-label="Expanded image">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="">
</div>

<style>
.expandable {
    cursor: zoom-in;
}
.refresh-wrap {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
}
#refresh-btn {
    background: none;
    border: none;
    padding: 0;
    color: #d65d0e;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
}
#refresh-btn:hover {
    opacity: 1;
}
#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

#lightbox.active {
    display: flex;
}

#lightbox-img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 2px;
}

#lightbox-close {
    position: fixed;
    top: 1rem;
    right: 1.25rem;
    background: none;
    border: none;
    color: white;
    font-size: 2.5rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0.8;
}

#lightbox-close:hover {
    opacity: 1;
}
</style>

<script>
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn    = document.getElementById('lightbox-close');

let remainingPool = [];

function checkLandscape(img) {
    if (img.naturalWidth > 0 && img.naturalWidth > img.naturalHeight) {
        img.closest('.photo-item').classList.add('landscape');
    }
}

function showRandomPhotos() {
    const items = [...document.querySelectorAll('.photo-item')];

    if (remainingPool.length < 4) {
        remainingPool = [...items].sort(() => Math.random() - 0.5);
    }

    items.forEach(item => item.style.display = 'none');
    remainingPool.splice(0, 4).forEach(item => item.style.display = '');
}

function initExpandListeners() {
    document.querySelectorAll('img.expandable').forEach(img => {
        img.addEventListener('click', () => {
            lightboxImg.src = img.dataset.full;
            lightboxImg.alt = img.dataset.alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            closeBtn.focus();
        });

        img.addEventListener('load', () => checkLandscape(img));
        if (img.complete) checkLandscape(img);
    });
}

function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImg.removeAttribute('src');
    document.body.style.overflow = '';
}

showRandomPhotos();
initExpandListeners();

document.getElementById('refresh-btn').addEventListener('click', showRandomPhotos);
closeBtn.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'Tab') {
            e.preventDefault();
            closeBtn.focus();
        }
    }
});
</script>
