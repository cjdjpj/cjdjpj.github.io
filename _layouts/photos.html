---
layout: default
---

<div class="photo-grid">
    {% for photo in page.photos %}
    <div class="photo-item">
        <img
            src="https://res.cloudinary.com/dbfwxtk7g/image/upload/f_auto,q_auto,w_800,dpr_auto/{{ photo.id }}"
            srcset="
            https://res.cloudinary.com/dbfwxtk7g/image/upload/f_auto,q_auto,w_400/{{ photo.id }} 400w,
            https://res.cloudinary.com/dbfwxtk7g/image/upload/f_auto,q_auto,w_800/{{ photo.id }} 800w,
            https://res.cloudinary.com/dbfwxtk7g/image/upload/f_auto,q_auto,w_1600/{{ photo.id }} 1600w
            "
            sizes="(max-width: 600px) 50vw, 800px"
            alt="{{ photo.alt }}"
            loading="lazy"
            class="expandable"
            data-full="https://res.cloudinary.com/dbfwxtk7g/image/upload/f_auto,q_auto,w_2400/{{ photo.id }}"
            data-alt="{{ photo.alt }}"
        >
        {% if photo.caption %}
        <p class="caption">{{ photo.caption }}</p>
        {% endif %}
    </div>
    {% endfor %}
</div>

<div id="lightbox" aria-modal="true" role="dialog" aria-label="Expanded image">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="">
</div>

<style>
.expandable {
    cursor: zoom-in;
}

#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

#lightbox.active {
    display: flex;
}

#lightbox-img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 2px;
}

#lightbox-close {
    position: fixed;
    top: 1rem;
    right: 1.25rem;
    background: none;
    border: none;
    color: white;
    font-size: 2.5rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0.8;
}

#lightbox-close:hover {
    opacity: 1;
}
</style>

<script>
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn    = document.getElementById('lightbox-close');

document.querySelectorAll('img.expandable').forEach(img => {
    img.addEventListener('click', () => {
        lightboxImg.src = img.dataset.full;
        lightboxImg.alt = img.dataset.alt;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    });
    img.addEventListener('load', () => {
        if (img.naturalWidth > img.naturalHeight) {
            img.closest('.photo-item').classList.add('landscape');
        }
    });
    if (img.complete && img.naturalWidth > img.naturalHeight) {
        img.closest('.photo-item').classList.add('landscape');
    }
});

function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
    document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
});
</script>
